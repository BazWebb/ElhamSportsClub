
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Membership</title>

<style>
   
</style>
   <link rel="stylesheet" href="styles.css">
</head>

<body class="home-page">

   <header> 
      <div id="nav-placeholder">Loading...</div>
       
     </header>
   
    <!-- MEMBERSHIP -->
<section id="membership">

  <h2>Membership</h2>

  <div class="grid">

    <div class="section-card">

      <h3>➕Join Elham Sports Club</h3>

      <p>
        Become a member and enjoy access to tennis,
        badminton, pickleball and club social events.
      </p>

      <ul>
        <li>✔ Floodlit tennis courts</li>
        <li>✔ Friendly club sessions</li>
        <li>✔ Coaching opportunities</li>
        <li>✔ Social events & tournaments</li>
      </ul>

      <div class="cta-container">
        <a
          href="https://clubspark.lta.org.uk/ElhamSportsClub/Membership/Join"
          target="_blank"
          rel="noopener"
          class="cta-btn tennis"
        >
          Join Online →
        </a>
      </div>

    </div>

  </div>

</section>
    
    
<div id="footer-placeholder"></div>

 <script>

 console.log("NAV SCRIPT START");

fetch('nav.html')
  .then(res => res.text())
  .then(data => {
    console.log("NAV LOADED");

    document.getElementById('nav-placeholder').innerHTML = data;

    const nav = document.getElementById("mobileNav");
    const overlay = document.getElementById("navOverlay");
    const hamburger = document.querySelector(".hamburger");

    console.log("Elements:", nav, overlay, hamburger);

    if (!nav || !overlay || !hamburger) {
      console.error("Nav elements missing");
      return;
    }

    hamburger.addEventListener("click", () => {
      nav.classList.toggle("open");
      overlay.classList.toggle("active");
    });

    function closeMenu() {
      nav.classList.remove("open");
      overlay.classList.remove("active");
    }

    overlay.addEventListener("click", closeMenu);

    nav.querySelectorAll("a").forEach(link => {
      link.addEventListener("click", closeMenu);
    });

    nav.querySelectorAll(".mobile-dropdown-header").forEach(header => {
      header.addEventListener("click", function() {
        const parent = this.parentElement;
        const sub = this.nextElementSibling;

        document.querySelectorAll(".mobile-dropdown").forEach(drop => {
          if (drop !== parent) {
            drop.classList.remove("open");
            const otherSub = drop.querySelector(".mobile-sub");
            if (otherSub) {
              otherSub.classList.remove("open");
              otherSub.style.maxHeight = null;
            }
          }
        });

        parent.classList.toggle("open");

        if (sub.classList.contains("open")) {
          sub.classList.remove("open");
          sub.style.maxHeight = null;
        } else {
          sub.classList.add("open");
          sub.style.maxHeight = sub.scrollHeight + "px";
        }
      });
    });

  })

    .catch(err => console.error("Nav load error:", err));

fetch('footer.html')
  .then(res => res.text())
  .then(data => {
    document.getElementById('footer-placeholder').innerHTML = data;
  })
  .catch(err => console.error("Footer load error:", err));
</script>
</html>
